<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <header>

  <select id="transactionHeader" name="transactionHeader"

</div>

<script>
  document.getElementById("transactionHeader").addEventListener("change", function () {
    if (this.value === "file_transaction") {
      window.location.href = "filetransaction.html";
    } else if (this.value === "form_transaction") {
      window.location.href = "formtransaction.html";
    }
  });
</script>
